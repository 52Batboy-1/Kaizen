<style>
:root {
  --paper: #f4f0e8;
  --paper-2: #ebe5d7;
  --paper-3: #e0d8c5;
  --ink: #1a1714;
  --ink-2: #3a352c;
  --ink-3: #6b6354;
  --ink-4: #9a9180;
  --rule: #c9c0a9;
  --accent: #6b1d1d;
  --accent-soft: #8a3838;
  --gold: #8a6f2c;
  --good: #3d5a3d;
  --serif: "Newsreader", "Iowan Old Style", "Hoefler Text", Georgia, serif;
  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace;
  --sans: "Geist", "Geist Sans", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  --r: 2px;
  --r-lg: 4px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button {
  font-family: inherit; color: inherit; background: transparent;
  border: 1px solid var(--ink); padding: 8px 14px; font-size: 13px;
  letter-spacing: 0.02em; cursor: pointer; border-radius: var(--r);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
button:hover { background: var(--ink); color: var(--paper); }
button.ghost { border-color: var(--rule); color: var(--ink-3); }
button.ghost:hover { background: var(--paper-2); color: var(--ink); border-color: var(--ink-3); }
button.primary { background: var(--ink); color: var(--paper); }
button.primary:hover { background: var(--accent); border-color: var(--accent); }
button.danger { border-color: var(--accent); color: var(--accent); }
button.danger:hover { background: var(--accent); color: var(--paper); }
input, textarea, select {
  font-family: inherit; color: inherit; background: transparent;
  border: none; border-bottom: 1px solid var(--rule);
  padding: 6px 0; font-size: 14px; outline: none; width: 100%;
}
input:focus, textarea:focus { border-bottom-color: var(--ink); }
textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
.app {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
  max-width: 1400px;
  margin: 0 auto;
}
.sidebar {
  border-right: 1px solid var(--rule);
  padding: 32px 24px;
  display: flex; flex-direction: column; gap: 32px;
  position: sticky; top: 0; height: 100vh;
  background: var(--paper);
}
.brand { display: flex; flex-direction: column; gap: 2px; }
.brand-mark { font-family: var(--serif); font-size: 28px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
.brand-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); }
.brand-kanji { font-family: var(--serif); font-size: 14px; color: var(--ink-3); margin-top: 4px; letter-spacing: 0.3em; }
.nav { display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px; font-size: 14px; cursor: pointer;
  border-radius: var(--r); color: var(--ink-2);
  transition: background 0.12s, color 0.12s;
  border: none; text-align: left; font-family: var(--sans); letter-spacing: 0;
}
.nav-item:hover { background: var(--paper-2); color: var(--ink); }
.nav-item.active { background: var(--ink); color: var(--paper); }
.nav-item .num { font-family: var(--mono); font-size: 10px; opacity: 0.5; }
.nav-item.active .num { opacity: 0.7; }
.sidebar-foot {
  margin-top: auto; padding-top: 16px; border-top: 1px solid var(--rule);
  font-family: var(--mono); font-size: 10px; color: var(--ink-3);
  letter-spacing: 0.06em; line-height: 1.6;
}
.main { padding: 40px 56px 80px; min-width: 0; }
.page-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  border-bottom: 1px solid var(--ink); padding-bottom: 18px; margin-bottom: 32px;
}
.page-head h1 {
  font-family: var(--serif); font-weight: 500; font-size: 44px;
  margin: 0; letter-spacing: -0.02em; line-height: 1;
}
.page-head .meta {
  font-family: var(--mono); font-size: 11px; color: var(--ink-3);
  letter-spacing: 0.08em; text-transform: uppercase; text-align: right; line-height: 1.7;
}
.card {
  border: 1px solid var(--rule); background: var(--paper);
  padding: 24px; border-radius: var(--r);
}
.card-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--rule);
}
.card-head h2 { font-family: var(--serif); font-weight: 500; font-size: 22px; margin: 0; letter-spacing: -0.01em; }
.card-head .aside { font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; }
.dash { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
.dash > .full { grid-column: 1 / -1; }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--rule); }
.stat { padding: 22px 20px; border-right: 1px solid var(--rule); display: flex; flex-direction: column; gap: 4px; }
.stat:last-child { border-right: none; }
.stat .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); }
.stat .value { font-family: var(--serif); font-size: 38px; font-weight: 500; line-height: 1; letter-spacing: -0.02em; }
.stat .value.mono { font-family: var(--mono); font-size: 28px; letter-spacing: -0.02em; }
.stat .value.accent { color: var(--accent); }
.stat .delta { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-top: 4px; }
.stat .delta.up { color: var(--good); }
.stat .delta.down { color: var(--accent); }
.compound { position: relative; height: 280px; background: var(--paper); }
.compound svg { width: 100%; height: 100%; display: block; }
.compound .axis text { font-family: var(--mono); font-size: 10px; fill: var(--ink-3); letter-spacing: 0.04em; }
.compound .grid-line { stroke: var(--rule); stroke-width: 0.5; stroke-dasharray: 2 4; }
.habit-grid { display: flex; flex-direction: column; }
.habit-row {
  display: grid; grid-template-columns: 1fr auto auto;
  align-items: center; padding: 14px 0; border-bottom: 1px solid var(--rule); gap: 16px;
}
.habit-row:last-child { border-bottom: none; }
.habit-name { font-size: 15px; display: flex; align-items: center; gap: 10px; }
.habit-name .ic { font-family: var(--mono); font-size: 10px; color: var(--ink-3); width: 24px; }
.habit-streak { font-family: var(--mono); font-size: 12px; color: var(--ink-3); display: flex; gap: 8px; align-items: center; }
.habit-streak .flame { color: var(--accent); }
.check {
  width: 28px; height: 28px; border: 1.5px solid var(--ink-4); border-radius: var(--r);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  background: transparent; transition: all 0.12s; padding: 0;
  font-family: var(--serif); font-size: 18px; color: transparent;
}
.check:hover { border-color: var(--ink); background: var(--paper-2); }
.check.done { background: var(--ink); border-color: var(--ink); color: var(--paper); }
.heatmap { display: grid; grid-template-columns: repeat(30, 1fr); gap: 3px; margin-top: 4px; }
.heat-cell { aspect-ratio: 1; background: var(--paper-3); border-radius: 1px; }
.heat-cell.l1 { background: var(--ink-4); }
.heat-cell.l4 { background: var(--ink); }
.heat-cell.future { background: transparent; border: 1px dashed var(--rule); }
.focus-overlay {
  position: fixed; inset: 0; background: var(--ink); color: var(--paper);
  z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--serif);
}
.focus-overlay .quote {
  position: absolute; top: 60px; left: 0; right: 0; text-align: center;
  font-family: var(--serif); font-style: italic; font-size: 16px; opacity: 0.5;
  padding: 0 40px; max-width: 600px; margin: 0 auto; line-height: 1.5;
}
.focus-overlay .label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.5; margin-bottom: 24px; }
.focus-overlay .timer { font-family: var(--serif); font-size: 180px; font-weight: 300; line-height: 1; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }
.focus-overlay .task { margin-top: 20px; font-size: 22px; font-style: italic; opacity: 0.8; max-width: 600px; text-align: center; }
.focus-overlay .controls { margin-top: 60px; display: flex; gap: 16px; }
.focus-overlay .controls button { border-color: var(--paper); color: var(--paper); padding: 12px 24px; }
.focus-overlay .controls button:hover { background: var(--paper); color: var(--ink); }
.focus-overlay .session-count { position: absolute; bottom: 40px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; opacity: 0.4; text-transform: uppercase; }
.set-grid { display: grid; grid-template-columns: 30px 1fr 80px 80px 60px 30px; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--rule); font-size: 14px; }
.set-grid.head { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); border-bottom: 1px solid var(--ink); }
.exercise-block { border: 1px solid var(--rule); padding: 16px 18px; margin-bottom: 12px; border-radius: var(--r); }
.exercise-name { font-family: var(--serif); font-size: 18px; letter-spacing: -0.01em; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: baseline; }
.exercise-name .pr { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.1em; }
.entry { border-bottom: 1px solid var(--rule); padding: 18px 0; }
.entry:last-child { border-bottom: none; }
.entry .when { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
.entry .body { font-family: var(--serif); font-size: 17px; line-height: 1.5; font-style: italic; }
.entry.weakness .when { color: var(--accent); }
.entry.weakness .body { font-style: normal; font-family: var(--sans); font-size: 14px; }
.identity-card { background: var(--ink); color: var(--paper); padding: 32px; border-radius: var(--r); }
.identity-card .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; margin-bottom: 12px; }
.identity-card .statement { font-family: var(--serif); font-size: 28px; line-height: 1.3; font-weight: 400; letter-spacing: -0.01em; }
.quote-card { padding: 32px; border: 1px solid var(--rule); background: var(--paper-2); border-radius: var(--r); }
.quote-card .quote-text { font-family: var(--serif); font-style: italic; font-size: 22px; line-height: 1.4; letter-spacing: -0.005em; }
.quote-card .quote-attr { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); margin-top: 16px; }
.friction-overlay { position: fixed; inset: 0; background: var(--paper); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
.friction-overlay .pre { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.friction-overlay h2 { font-family: var(--serif); font-size: 36px; font-weight: 500; margin: 0 0 24px; letter-spacing: -0.02em; text-align: center; max-width: 700px; line-height: 1.2; }
.friction-overlay .sentence { font-family: var(--serif); font-size: 20px; font-style: italic; color: var(--ink-3); text-align: center; margin-bottom: 32px; line-height: 1.5; max-width: 600px; }
.friction-overlay textarea { max-width: 600px; width: 100%; border: 1px solid var(--rule); padding: 16px; font-family: var(--serif); font-size: 18px; border-radius: var(--r); min-height: 120px; background: var(--paper-2); }
.friction-overlay .progress { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-top: 12px; letter-spacing: 0.08em; }
.row { display: flex; gap: 16px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 12px; }
.between { display: flex; justify-content: space-between; align-items: center; }
.muted { color: var(--ink-3); }
.mono { font-family: var(--mono); }
.serif { font-family: var(--serif); }
.tiny { font-size: 11px; letter-spacing: 0.08em; }
.gap-24 { gap: 24px; }
.gap-32 { gap: 32px; }
.mt-24 { margin-top: 24px; }
.mt-32 { margin-top: 32px; }
.divider { border: none; border-top: 1px solid var(--rule); margin: 24px 0; }
.divider.heavy { border-top-color: var(--ink); }
.tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid var(--rule); padding: 3px 8px; border-radius: 100px; color: var(--ink-3); }
.tag.accent { color: var(--accent); border-color: var(--accent); }
.tag.good { color: var(--good); border-color: var(--good); }
.bar { height: 4px; background: var(--paper-3); position: relative; border-radius: 2px; overflow: hidden; }
.bar > span { display: block; height: 100%; background: var(--ink); transition: width 0.4s; }
.banner { border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); padding: 14px 0; display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 32px; color: var(--ink-2); }
body.theme-ink {
  --paper: #14110d; --paper-2: #1c1814; --paper-3: #26211b;
  --ink: #f0e8d4; --ink-2: #c9c0a9; --ink-3: #8a8170; --ink-4: #5a5347;
  --rule: #2e2820; --accent: #c25d5d; --accent-soft: #a14848;
  --gold: #c9a94a; --good: #6e9c6e;
}
body.theme-forge {
  --paper: #0a0a0a; --paper-2: #141414; --paper-3: #1f1f1f;
  --ink: #ffffff; --ink-2: #d4d4d4; --ink-3: #8a8a8a; --ink-4: #5a5a5a;
  --rule: #2a2a2a; --accent: #d4622a; --accent-soft: #b04f1e;
  --gold: #e0a83c; --good: #4a9b6e;
}
.setup { max-width: 560px; margin: 80px auto; padding: 40px; border: 1px solid var(--rule); border-radius: var(--r); background: var(--paper); }
.setup h1 { font-family: var(--serif); font-size: 36px; font-weight: 500; letter-spacing: -0.02em; margin: 0 0 8px; }
.setup .sub { font-family: var(--serif); font-style: italic; color: var(--ink-3); margin-bottom: 32px; font-size: 16px; line-height: 1.5; }
.setup label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; margin-top: 20px; }
.setup input { font-family: var(--mono); font-size: 13px; padding: 10px 12px; border: 1px solid var(--rule); border-radius: var(--r); background: var(--paper-2); }
.setup input:focus { border-color: var(--ink); }
.setup .actions { margin-top: 32px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.sync-banner { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); border-bottom: 1px solid var(--rule); background: var(--paper-2); }
.sync-banner .live { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--good); margin-right: 8px; animation: live-pulse 2s ease-in-out infinite; }
.sync-banner .live.error { background: var(--accent); animation: none; }
.sync-banner .live.syncing { background: var(--gold); }
@keyframes live-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.sync-banner button { border: 1px solid var(--rule); background: transparent; color: var(--ink-3); font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; padding: 4px 10px; }
.sync-banner button:hover { color: var(--ink); border-color: var(--ink-3); background: transparent; }
.empty-state { padding: 60px 20px; text-align: center; color: var(--ink-3); font-family: var(--serif); font-style: italic; font-size: 16px; border: 1px dashed var(--rule); border-radius: var(--r); }
.read-only-tag { display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; color: var(--ink-3); border: 1px solid var(--rule); padding: 2px 6px; border-radius: 100px; text-transform: uppercase; margin-left: 8px; vertical-align: middle; }
/* focus screen */
.focus-start-card { display: flex; flex-direction: column; gap: 16px; }
.focus-duration-row { display: flex; gap: 8px; flex-wrap: wrap; }
</style>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) ro.observe(document.documentElement);
    else window.addEventListener('resize', clampToViewport);
    return () => { if (ro) ro.disconnect(); else window.removeEventListener('resize', clampToViewport); };
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {

      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>

  );
}

const STORAGE_KEY  = "kaizen.v3.config";
const PROFILES_KEY = "kaizen.v3.profiles";

function loadConfig() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); } catch { return null; } }
function saveConfig(c) { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }
function clearConfig() { localStorage.removeItem(STORAGE_KEY); }
function loadProfiles() { try { return JSON.parse(localStorage.getItem(PROFILES_KEY) || "[]"); } catch { return []; } }
function saveProfiles(list) { localStorage.setItem(PROFILES_KEY, JSON.stringify(list)); }
function upsertProfile(p) {
  const list = loadProfiles();
  const idx = list.findIndex(x => x.username.toLowerCase() === p.username.toLowerCase());
  if (idx >= 0) list[idx] = { ...list[idx], ...p }; else list.push(p);
  saveProfiles(list); return list;
}
function removeProfile(username) {
  const list = loadProfiles().filter(x => x.username.toLowerCase() !== username.toLowerCase());
  saveProfiles(list); return list;
}
function newUserId() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16); });
}

async function sbFetch(cfg, path, opts = {}) {
  const url = `${cfg.url.replace(/\/$/, "")}/rest/v1/${path}`;
  const headers = {
    "apikey": cfg.anonKey,
    "Authorization": `Bearer ${cfg.anonKey}`,
    "x-user-id": cfg.userId,
    "Content-Type": "application/json",
    ...(opts.headers || {}),
  };
  const res = await fetch(url, { ...opts, headers });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  if (res.status === 204) return null;
  return res.json();
}

async function loadAll(cfg) {
  const uid = cfg.userId;
  const q = `user_id=eq.${uid}`;
  const [habits, habitLogs, workouts, exercises, sets, focus, journal, weakness, identity, wins, goals] = await Promise.all([
    sbFetch(cfg, `habits?${q}&archived=eq.false&order=position.asc`),
    sbFetch(cfg, `habit_logs?${q}&order=date.desc&limit=2000`),
    sbFetch(cfg, `workouts?${q}&order=date.desc&limit=200`),
    sbFetch(cfg, `workout_exercises?${q}&order=position.asc`),
    sbFetch(cfg, `workout_sets?${q}&order=position.asc`),
    sbFetch(cfg, `focus_sessions?${q}&order=date.desc&limit=200`),
    sbFetch(cfg, `journal_entries?${q}&order=created_at.desc&limit=200`),
    sbFetch(cfg, `weakness_entries?${q}&order=created_at.desc&limit=200`),
    sbFetch(cfg, `identity_state?${q}&limit=1`),
    sbFetch(cfg, `wins?order=date.desc&limit=200`).catch(() => []),
    sbFetch(cfg, `goals?order=updated_at.desc&limit=200`).catch(() => []),
  ]);

  const history = {};
  habits.forEach(h => { history[h.id] = {}; });
  habitLogs.forEach(l => {
    if (!history[l.habit_id]) history[l.habit_id] = {};
    history[l.habit_id][l.date] = l.done;
  });

  const exercisesByWorkout = {};
  exercises.forEach(e => {
    if (!exercisesByWorkout[e.workout_id]) exercisesByWorkout[e.workout_id] = [];
    exercisesByWorkout[e.workout_id].push({ ...e, sets: [] });
  });
  const exerciseById = {};
  Object.values(exercisesByWorkout).flat().forEach(e => { exerciseById[e.id] = e; });
  sets.forEach(s => { const ex = exerciseById[s.exercise_id]; if (ex) ex.sets.push({ reps: s.reps, load: s.load_text, rpe: s.rpe }); });
  const workoutsShaped = workouts.map(w => ({
    id: w.id, date: w.date, day: w.day_type, name: w.name, duration: w.duration_min,
    exercises: (exercisesByWorkout[w.id] || []).map(e => ({ name: e.name, sets: e.sets })),
  }));

  const id = (identity && identity[0]) || {};
  return {
    habits: habits.map(h => ({ id: h.id, name: h.name, icon: h.icon_num, category: h.category })),
    history,
    workouts: workoutsShaped,
    journal: journal.map(j => ({ id: j.id, when: new Date(j.created_at).getTime(), body: j.body, source: j.source })),
    weaknesses: weakness.map(w => ({ id: w.id, when: new Date(w.created_at).getTime(), body: w.body, source: w.source })),
    focusSessions: focus.map(f => ({ date: f.date, minutes: f.minutes, task: f.task })),
    wins: (wins || []).map(w => ({ id: w.remote_id, title: w.title, description: w.description || "", date: w.date, when: w.updated_at ? Number(w.updated_at) : 0 })),
    goals: (goals || []).map(g => ({ id: g.remote_id, title: g.title, description: g.description || "", targetDate: g.target_date || "", status: g.status || "ACTIVE" })),
    commitment: id.commitment || "I am someone who keeps small promises to himself.",
    startedOn: id.started_on || new Date().toISOString().slice(0, 10),
    todayPlan: id.today_plan || "",
  };
}

function todayKey() { const d = new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); }
function dateKey(daysAgo = 0) { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - daysAgo); return d.toISOString().slice(0,10); }
function streakFor(history, habitId) {
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const v = history[habitId]?.[dateKey(i)];
    if (v === true) streak++;
    else if (i === 0) continue;
    else break;
  }
  return streak;
}
function completionRate(history, days = 30) {
  const habitIds = Object.keys(history);
  let done = 0, total = 0;
  for (let i = 0; i < days; i++) {
    const k = dateKey(i);
    habitIds.forEach((id) => {
      const v = history[id]?.[k];
      if (v === true) done++;
      if (v === true || v === false) total++;
    });
  }
  return total ? done / total : 0;
}
function daysSince(dateStr) {
  return Math.floor((new Date() - new Date(dateStr)) / 86400000);
}

const { useState, useEffect, useRef, useMemo, useCallback } = React;

function CompoundChart({ rate30, daysIn = 47, totalDays = 365 }) {
  const W = 720, H = 280, padL = 48, padR = 24, padT = 16, padB = 32;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const userMult = 0.997 + rate30 * 0.018;
  const idealMult = 1.01, declineMult = 0.99;
  const points = (mult) => { const pts = []; for (let d = 0; d <= totalDays; d += 5) pts.push([d, Math.pow(mult, d)]); return pts; };
  const ideal = points(idealMult), user = points(userMult), decline = points(declineMult);
  const allY = [...ideal, ...user, ...decline].map(p => p[1]);
  const yMin = Math.min(...allY, 0.5), yMax = Math.max(...allY, 40);
  const yLog = (y) => { const lMin = Math.log(yMin), lMax = Math.log(yMax); return innerH - ((Math.log(y) - lMin) / (lMax - lMin)) * innerH + padT; };
  const xScale = (d) => (d / totalDays) * innerW + padL;
  const path = (pts) => pts.map(([d, v], i) => `${i === 0 ? "M" : "L"} ${xScale(d).toFixed(1)} ${yLog(v).toFixed(1)}`).join(" ");
  const gridYs = [0.5, 1, 2, 5, 10, 20, 37.78], gridXs = [0, 90, 180, 270, 365];
  const userTodayY = yLog(Math.pow(userMult, daysIn)), userTodayX = xScale(daysIn);
  return (
    <div className="compound">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id="userArea" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="var(--ink)" stopOpacity="0.08" />
            <stop offset="100%" stopColor="var(--ink)" stopOpacity="0" />
          </linearGradient>
        </defs>
        {gridYs.map(y => (
          <g key={y}>
            <line className="grid-line" x1={padL} x2={W - padR} y1={yLog(y)} y2={yLog(y)} />
            <text x={padL - 8} y={yLog(y) + 3} textAnchor="end" fontFamily="var(--mono)" fontSize="10" fill="var(--ink-3)">{y >= 1 ? `${y}×` : `${y}×`}</text>
          </g>
        ))}
        {gridXs.map(x => (
          <g key={x} className="axis">
            <line className="grid-line" x1={xScale(x)} x2={xScale(x)} y1={padT} y2={H - padB} />
            <text x={xScale(x)} y={H - padB + 16} textAnchor="middle" fontFamily="var(--mono)" fontSize="10" fill="var(--ink-3)">{x}d</text>
          </g>
        ))}
        <line x1={padL} x2={W - padR} y1={yLog(1)} y2={yLog(1)} stroke="var(--ink-3)" strokeWidth="0.8" />
        <path d={path(ideal)} stroke="var(--accent)" strokeWidth="1.2" fill="none" strokeDasharray="3 3" opacity="0.7" />
        <path d={path(decline)} stroke="var(--ink-4)" strokeWidth="1" fill="none" strokeDasharray="2 4" opacity="0.6" />
        <path d={`${path(user)} L ${xScale(totalDays)} ${yLog(yMin)} L ${padL} ${yLog(yMin)} Z`} fill="url(#userArea)" />
        <path d={path(user)} stroke="var(--ink)" strokeWidth="1.8" fill="none" />
        <line x1={userTodayX} x2={userTodayX} y1={padT} y2={H - padB} stroke="var(--accent)" strokeWidth="0.8" strokeDasharray="2 2" opacity="0.6" />
        <circle cx={userTodayX} cy={userTodayY} r="4" fill="var(--accent)" />
        <circle cx={userTodayX} cy={userTodayY} r="8" fill="none" stroke="var(--accent)" strokeWidth="0.8" opacity="0.4" />
        <text x={W - padR - 4} y={yLog(Math.pow(idealMult, totalDays)) - 6} textAnchor="end" fontFamily="var(--mono)" fontSize="10" fill="var(--accent)">+1% / day → 37.78×</text>
        <text x={W - padR - 4} y={yLog(Math.pow(declineMult, totalDays)) + 14} textAnchor="end" fontFamily="var(--mono)" fontSize="10" fill="var(--ink-3)">−1% / day → 0.03×</text>
      </svg>
    </div>
  );
}

function Heatmap({ history, habitId, days = 90 }) {
  const cells = [];
  for (let i = days - 1; i >= 0; i--) {
    const k = dateKey(i), v = history[habitId]?.[k];
    let cls = "heat-cell";
    if (v === true) cls += " l4";
    else if (v === false) cls += " l1";
    else cls += " future";
    cells.push(<div key={k} className={cls} title={`${k} — ${v === true ? "done" : v === false ? "missed" : ""}`} />);
  }
  return <div className="heatmap">{cells}</div>;
}

function FocusOverlay({ minutes, task, onClose, onComplete, sessionsToday }) {
  const totalSec = minutes * 60;
  const [remaining, setRemaining] = useState(totalSec);
  const [running, setRunning] = useState(true);
  const quote = useMemo(() => QUOTES[Math.floor(Math.random() * QUOTES.length)], []);

  useEffect(() => {
    if (!running) return;
    const iv = setInterval(() => {
      setRemaining(r => {
        if (r <= 1) { clearInterval(iv); onComplete?.(minutes); return 0; }
        return r - 1;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [running]);

  const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
  const ss = String(remaining % 60).padStart(2, "0");
  return (
    <div className="focus-overlay">
      <div className="quote">"{quote.text}" — {quote.attr}</div>
      <div className="label">Lock-in · {minutes} min</div>
      <div className="timer">{mm}:{ss}</div>
      {task && <div className="task">{task}</div>}
      <div className="controls">
        <button onClick={() => setRunning(r => !r)}>{running ? "Pause" : "Resume"}</button>
        <button onClick={onClose}>End session</button>
      </div>
      <div className="session-count">Today · {sessionsToday} session{sessionsToday === 1 ? "" : "s"} completed</div>
    </div>
  );
}

function CreateProfile({ theme, setTheme, onSave, hasProfiles, onCancel }) {
  const [username, setUsername] = useState("");
  const [url, setUrl] = useState("");
  const [anonKey, setAnonKey] = useState("");
  const [userId, setUserId] = useState(() => newUserId());
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    const list = loadProfiles();
    if (list.length > 0 && !url && !anonKey) {
      setUrl(list[0].url || "");
      setAnonKey(list[0].anonKey || "");
    } else if (list.length === 0 && window.__KAIZEN_PREFILL) {
      setUrl(window.__KAIZEN_PREFILL.url || "");
      setAnonKey(window.__KAIZEN_PREFILL.anonKey || "");
    }
  }, []);

  async function connect() {
    if (!username.trim() || !url || !anonKey || !userId) { setError("All fields are required."); return; }
    if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(userId)) {
      setError("User ID must be a valid UUID."); return;
    }
    setError(""); setBusy(true);
    try {
      await sbFetch({ url, anonKey, userId }, `habits?user_id=eq.${userId}&limit=1`);
      onSave({ username: username.trim(), url, anonKey, userId, theme });
    } catch (e) { setError("Connection failed: " + e.message); }
    finally { setBusy(false); }
  }

  return (
    <>
      <label>Username</label>
      <input type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder="e.g. Jordan" autoFocus />
      <label>Supabase URL</label>
      <input type="text" value={url} onChange={e => setUrl(e.target.value)} placeholder="https://xxxx.supabase.co" />
      <label>Anon key</label>
      <input type="password" value={anonKey} onChange={e => setAnonKey(e.target.value)} placeholder="eyJhbGciOi…" />
      <label>User ID (UUID — from Android app Settings)</label>
      <div className="row" style={{ gap: 8 }}>
        <input type="text" value={userId} onChange={e => setUserId(e.target.value)} style={{ flex: 1 }} />
        <button className="ghost" type="button" onClick={() => setUserId(newUserId())} title="Generate new UUID">↻</button>
      </div>
      <div className="muted tiny mono" style={{ marginTop: 6, letterSpacing: "0.08em" }}>COPY FROM ANDROID APP → SETTINGS → EXPORT USER ID</div>
      <label style={{ marginTop: 20 }}>Theme</label>
      <div className="row" style={{ gap: 8, marginTop: 4 }}>
        {["paper", "ink", "forge"].map(t => <button key={t} className={theme === t ? "primary" : "ghost"} onClick={() => setTheme(t)}>{t}</button>)}
      </div>
      {error && <div style={{ marginTop: 16, color: "var(--accent)", fontFamily: "var(--mono)", fontSize: 12 }}>{error}</div>}
      <div className="actions">
        <button className="primary" disabled={busy} onClick={connect}>{busy ? "Connecting…" : "Create & connect"}</button>
        {hasProfiles && <button className="ghost" onClick={onCancel}>← Back</button>}
      </div>
    </>
  );
}

function KaizenApp({ config, onResetConfig }) {
  const [data, setData] = useState(null);
  const [screen, setScreen] = useState("today");
  const [syncState, setSyncState] = useState({ status: "syncing", at: null, err: null });
  const [tweaks, setTweak] = useTweaks({ "theme": "paper", "showQuote": true });

  useEffect(() => {
    const t = config.theme || tweaks.theme || "paper";
    document.body.className = t === "paper" ? "" : `theme-${t}`;
  }, [config.theme, tweaks.theme]);

  const fetchAll = useCallback(async () => {
    setSyncState(s => ({ ...s, status: "syncing" }));
    try {
      const d = await loadAll(config);
      setData(d);
      setSyncState({ status: "ok", at: Date.now(), err: null });
    } catch (e) {
      setSyncState({ status: "error", at: Date.now(), err: e.message });
    }
  }, [config]);

  useEffect(() => {
    fetchAll();
    const iv = setInterval(fetchAll, POLL_MS);
    return () => clearInterval(iv);
  }, [fetchAll]);

  const quote = useMemo(() => {
    const seed = todayKey().split("-").reduce((a, b) => a + parseInt(b, 10), 0);
    return QUOTES[seed % QUOTES.length];
  }, []);

  if (!data) {
    return (
      <>
        <SyncBanner state={syncState} onRefresh={fetchAll} onReset={onResetConfig} />
        <div style={{ maxWidth: 560, margin: "80px auto", padding: 40 }}>
          <div className="empty-state">
            {syncState.status === "error"
              ? <><span>Could not reach Supabase.</span><br/><span className="mono tiny" style={{ color: "var(--accent)" }}>{syncState.err}</span><br/><br/><button onClick={onResetConfig}>Reconfigure</button></>
              : "Loading from Supabase…"}
          </div>
        </div>
      </>
    );
  }

  const days = daysSince(data.startedOn);
  const rate30 = completionRate(data.history, 30);

  async function addJournal(body) {
    const created = await postJournal(config, body);
    if (created) await fetchAll();
  }
  async function addWeakness(body) {
    const created = await postWeakness(config, body);
    if (created) await fetchAll();
  }

  return (
    <>
      <SyncBanner state={syncState} onRefresh={fetchAll} onReset={onResetConfig} />
      <div className="app">
        <Sidebar screen={screen} setScreen={setScreen} days={days} />
        <main className="main">
          {screen === "today"    && <TodayScreen data={data} quote={quote} rate30={rate30} days={days} showQuote={tweaks.showQuote} />}
          {screen === "habits"   && <HabitsScreen data={data} />}
          {screen === "workouts" && <WorkoutsScreen data={data} />}
          {screen === "focus"    && <FocusScreen data={data} config={config} onRefresh={fetchAll} />}
          {screen === "wins"     && <WinsScreen data={data} />}
          {screen === "ledger"   && <LedgerScreen data={data} addWeakness={addWeakness} />}
          {screen === "journal"  && <JournalScreen data={data} addJournal={addJournal} />}
        </main>
        <KaizenTweaks tweaks={tweaks} setTweak={(k, v) => {
          setTweak(k, v);
          if (k === "theme") {
            saveConfig({ ...config, theme: v });
            document.body.className = v === "paper" ? "" : `theme-${v}`;
          }
        }} onResetConfig={onResetConfig} currentTheme={config.theme || tweaks.theme} />
      </div>
    </>
  );
}

function SyncBanner({ state, onRefresh, onReset }) {
  const ago = state.at ? Math.round((Date.now() - state.at) / 1000) : null;
  const liveCls = state.status === "error" ? "live error" : state.status === "syncing" ? "live syncing" : "live";
  const label = state.status === "error" ? "ERROR" : state.status === "syncing" ? "SYNCING" : "MIRRORING";
  return (
    <div className="sync-banner">
      <div>
        <span className={liveCls}></span>
        {label}
        {state.status === "ok" && ago !== null && <> · LAST SYNC {ago}s AGO</>}
        {state.status === "error" && <> · {state.err}</>}
      </div>
      <div className="row" style={{ gap: 8 }}>
        <button onClick={onRefresh}>↻ Refresh</button>
        <button onClick={onReset}>Disconnect</button>
      </div>

  );
}

          </section>
          <section className="card">
            <div className="card-head"><h2>Last 7 sessions</h2><span className="aside">focused minutes</span></div>
            {last7.length === 0 ? <div className="empty-state">No focus sessions yet.</div> : (
              <div className="col" style={{ gap: 16 }}>
                {last7.map((f, i) => (
                  <div key={i} className="row" style={{ gap: 16 }}>
                    <span className="mono tiny muted" style={{ width: 80, letterSpacing: "0.1em" }}>{f.date.slice(5)}</span>
                    <div className="bar" style={{ flex: 1 }}><span style={{ width: `${f.minutes / max * 100}%` }} /></div>
                    <span className="mono tiny" style={{ width: 60, textAlign: "right" }}>{f.minutes}m{f.task ? " · " + f.task.slice(0, 12) : ""}</span>
                  </div>
                ))}
              </div>
            )}
          </section>
        </div>
        <div className="col gap-24">
          <section className="identity-card">
            <div className="label">The rule</div>
            <div className="statement" style={{ fontSize: 22, fontStyle: "italic" }}>
              "When you sit down, do not stand up until the timer ends. Boredom is information. Stay in it."
            </div>
          </section>
          <section className="card">
            <div className="card-head"><h2>Stats</h2><span className="aside">all time</span></div>
            <div className="col" style={{ gap: 16 }}>
              <div className="between"><span className="muted">Total sessions</span><span className="serif" style={{ fontSize: 24 }}>{data.focusSessions.length}</span></div>
              <hr className="divider" style={{ margin: 0 }} />
              <div className="between"><span className="muted">Total minutes</span><span className="serif" style={{ fontSize: 24 }}>{totalMin}</span></div>
              <hr className="divider" style={{ margin: 0 }} />
              <div className="between"><span className="muted">Average</span><span className="serif" style={{ fontSize: 24 }}>{Math.round(totalMin / Math.max(1, data.focusSessions.length))}m</span></div>
              <hr className="divider" style={{ margin: 0 }} />
              <div className="between"><span className="muted">Best session</span><span className="serif" style={{ fontSize: 24 }}>{Math.max(...data.focusSessions.map(f => f.minutes), 0)}m</span></div>
            </div>
          </section>
        </div>
      </div>
    </>
  );
}

function WinsScreen({ data }) {
  const wins = data.wins || [], goals = data.goals || [];
  const activeGoals = goals.filter(g => g.status === "ACTIVE");
  const completedGoals = goals.filter(g => g.status === "COMPLETED");
  const grouped = {};
  wins.forEach(w => { const m = (w.date || "").slice(0, 7) || "undated"; if (!grouped[m]) grouped[m] = []; grouped[m].push(w); });
  const months = Object.keys(grouped).sort().reverse();

  return (
    <>
      <div className="page-head">
        <h1>Wins<span className="read-only-tag">read</span></h1>
        <div className="meta">{wins.length} wins logged<br/>{activeGoals.length} active goal{activeGoals.length === 1 ? "" : "s"}</div>
      </div>
      <div className="dash">
        <div className="col gap-24">
          <section className="card">
            <div className="card-head"><h2>The receipts</h2><span className="aside">{wins.length} total</span></div>
            {wins.length === 0 ? <div className="empty-state">No wins yet. Log them in the Android app.</div>
              : months.map(m => (
                <div key={m} style={{ marginBottom: 24 }}>
                  <div className="mono tiny muted" style={{ letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 12, paddingBottom: 6, borderBottom: "1px solid var(--rule)" }}>
                    {m === "undated" ? "—" : new Date(m + "-01").toLocaleDateString("en-US", { month: "long", year: "numeric" })} · {grouped[m].length}
                  </div>
                  <div className="col" style={{ gap: 14 }}>
                    {grouped[m].map(w => (
                      <div key={w.id} className="entry">
                        <div className="when">{w.date}</div>
                        <div style={{ fontFamily: "var(--serif)", fontSize: 19, letterSpacing: "-0.01em", marginBottom: w.description ? 6 : 0 }}>{w.title}</div>
                        {w.description && <div className="body" style={{ fontStyle: "italic", opacity: 0.85 }}>{w.description}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
          </section>
        </div>
        <div className="col gap-24">
          <section className="identity-card">
            <div className="label">Why this exists</div>
            <div className="statement" style={{ fontSize: 20, lineHeight: 1.4 }}>
              The mind discounts good days and rehearses bad ones. The wins ledger corrects the imbalance.
            </div>
          </section>
          {activeGoals.length > 0 && (
            <section className="card">
              <div className="card-head"><h2>Active goals</h2><span className="aside">{activeGoals.length}</span></div>
              <div className="col" style={{ gap: 16 }}>
                {activeGoals.map(g => {
                  const daysLeft = g.targetDate ? Math.ceil((new Date(g.targetDate) - new Date()) / 86400000) : null;
                  return (
                    <div key={g.id}>
                      <div style={{ fontFamily: "var(--serif)", fontSize: 17, marginBottom: 4 }}>{g.title}</div>
                      {g.description && <div className="muted tiny" style={{ marginBottom: 4 }}>{g.description}</div>}
                      {g.targetDate && (
                        <div className="mono tiny" style={{ letterSpacing: "0.1em", color: daysLeft !== null && daysLeft <= 7 ? "var(--accent)" : daysLeft !== null && daysLeft <= 30 ? "var(--gold)" : "var(--ink-3)" }}>
                          BY {g.targetDate.toUpperCase()}{daysLeft !== null ? ` · ${daysLeft}d` : ""}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </section>
          )}
          {completedGoals.length > 0 && (
            <section className="card">
              <div className="card-head"><h2>Goals completed</h2><span className="aside">{completedGoals.length}</span></div>
              <div className="col" style={{ gap: 12 }}>
                {completedGoals.map(g => (
                  <div key={g.id} className="row" style={{ justifyContent: "space-between", gap: 12 }}>
                    <span style={{ fontFamily: "var(--serif)", fontSize: 16 }}>✓ {g.title}</span>
                    {g.targetDate && <span className="mono tiny muted">{g.targetDate}</span>}
                  </div>
                ))}
              </div>
            </section>
          )}
        </div>
      </div>
    </>
  );
}

function LedgerScreen({ data, addWeakness }) {
  const [body, setBody] = useState("");
  const [busy, setBusy] = useState(false);
  return (
    <>
      <div className="page-head">
        <h1>The Ledger<span className="read-only-tag" style={{ borderColor: "var(--accent)", color: "var(--accent)" }}>web writes</span></h1>
        <div className="meta">A record of slips · honesty over comfort<br/>{data.weaknesses.length} entries</div>
      </div>
      <div className="dash">
        <div className="col gap-24">
          <section className="card">
            <div className="card-head"><h2>Log a slip</h2><span className="aside">syncs to android</span></div>
            <textarea value={body} onChange={e => setBody(e.target.value)}
              placeholder="What happened? Be specific. No self-flagellation, no excuses."
              style={{ minHeight: 100, padding: 14, border: "1px solid var(--rule)", borderRadius: 2 }} />
            <div className="row" style={{ gap: 10, marginTop: 12 }}>
              <button className="danger" disabled={busy || !body.trim()} onClick={async () => {
                setBusy(true);
                try { await addWeakness(body.trim()); setBody(""); } finally { setBusy(false); }
              }}>{busy ? "Recording…" : "Record"}</button>
              <span className="muted tiny mono" style={{ letterSpacing: "0.1em" }}>SHAME IS NOT THE POINT · NOTICING IS</span>
            </div>
          </section>
          <section className="card">
            <div className="card-head"><h2>Recent slips</h2><span className="aside">{data.weaknesses.length} total</span></div>
            {data.weaknesses.length === 0 ? <div className="empty-state">No slips logged.</div>
              : data.weaknesses.map(w => (
                <div key={w.id} className="entry weakness">
                  <div className="when">{new Date(w.when).toLocaleString()} · {(w.source || "android").toUpperCase()}</div>
                  <div className="body">{w.body}</div>
                </div>
              ))}
          </section>
        </div>
        <div className="col gap-24">
          <section className="identity-card">
            <div className="label">Why this exists</div>
            <div className="statement" style={{ fontSize: 20, lineHeight: 1.4 }}>
              You can't fix what you won't look at. The ledger turns invisible patterns into visible ones. The visible can be changed.
            </div>
          </section>
        </div>
      </div>
    </>
  );
}

function JournalScreen({ data, addJournal }) {
  const [body, setBody] = useState("");
  const [busy, setBusy] = useState(false);
  return (
    <>
      <div className="page-head">
        <h1>Journal<span className="read-only-tag" style={{ borderColor: "var(--accent)", color: "var(--accent)" }}>web writes</span></h1>
        <div className="meta">{data.journal.length} entries<br/>A record of the practice</div>
      </div>
      <div className="dash">
        <div className="col gap-24">
          <section className="card">
            <div className="card-head"><h2>Tonight's reflection</h2><span className="aside">syncs to android</span></div>
            <textarea value={body} onChange={e => setBody(e.target.value)}
              placeholder="What did I do well today? What did I avoid? What is one thing I will change tomorrow?"
              style={{ minHeight: 160, padding: 16, border: "1px solid var(--rule)", borderRadius: 2, fontFamily: "var(--serif)", fontSize: 17, lineHeight: 1.5, fontStyle: "italic" }} />
            <div className="row" style={{ marginTop: 12 }}>
              <button className="primary" disabled={busy || !body.trim()} onClick={async () => {
                setBusy(true);
                try { await addJournal(body.trim()); setBody(""); } finally { setBusy(false); }
              }}>{busy ? "Recording…" : "Record"}</button>
            </div>
          </section>
          <section className="card">
            <div className="card-head"><h2>Past entries</h2><span className="aside">{data.journal.length}</span></div>
            {data.journal.length === 0 ? <div className="empty-state">No entries yet.</div>
              : data.journal.map(j => (
                <div key={j.id} className="entry">
                  <div className="when">{new Date(j.when).toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })} · {(j.source || "android").toUpperCase()}</div>
                  <div className="body">{j.body}</div>
                </div>
              ))}
          </section>
        </div>
        <div className="col gap-24">
          <section className="quote-card">
            <div className="quote-text">"Every night, before I let my body sleep, I ask it: what fault of yours have you mended today? What vice resisted? In what way are you better?"</div>
            <div className="quote-attr">— Seneca · adapted</div>
          </section>
          <section className="card">
            <div className="card-head"><h2>Three prompts</h2><span className="aside">if stuck</span></div>
            <div className="col" style={{ gap: 16, fontFamily: "var(--serif)", fontSize: 16, lineHeight: 1.5, fontStyle: "italic" }}>
              <div>What did I avoid today, and why?</div>
              <hr className="divider" style={{ margin: 0 }} />
              <div>What was the hardest right thing I did?</div>
              <hr className="divider" style={{ margin: 0 }} />
              <div>What would tomorrow's better version of me have done differently?</div>
            </div>
          </section>
        </div>
      </div>
    </>
  );
}

function KaizenTweaks({ tweaks, setTweak, onResetConfig, currentTheme }) {
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Aesthetic">
        <TweakRadio
          label="Theme"
          value={currentTheme || "paper"}
          options={[{ label: "Paper", value: "paper" }, { label: "Ink", value: "ink" }, { label: "Forge", value: "forge" }]}
          onChange={(v) => setTweak("theme", v)}
        />
        <TweakToggle label="Show daily quote" value={tweaks.showQuote} onChange={(v) => setTweak("showQuote", v)} />
      </TweakSection>
      <TweakSection label="Connection">
        <TweakButton label="Disconnect Supabase" onClick={onResetConfig} />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
