<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizen</title>
  <style>
    :root {
      --bg:      #0A0A0F;
      --card:    #13131A;
      --card2:   #1A1A24;
      --border:  rgba(255,255,255,0.08);
      --gold:    #F59E0B;
      --golddim: rgba(245,158,11,0.55);
      --text:    #F1F1F3;
      --muted:   rgba(241,241,243,0.45);
      --green:   #4ADE80;
      --red:     #F87171;
      --blue:    #60A5FA;
      --streak:  #FB923C;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* Header */
    header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .logo-k    { font-size: 28px; font-weight: 900; color: var(--gold); letter-spacing: -1px; }
    .logo-rest { font-size: 28px; font-weight: 900; color: var(--text); letter-spacing: -1px; }
    .logo-sub  { font-size: 10px; letter-spacing: 3px; color: var(--golddim); text-transform: uppercase; margin-left: 10px; }
    .refresh-btn { background: none; border: 1px solid var(--border); color: var(--gold); font-size: 18px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .refresh-btn:hover { background: rgba(245,158,11,0.1); }

    /* Tabs */
    .tabs { display: flex; gap: 8px; padding: 14px 24px; border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; }
    .tab.active { border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.1); color: var(--gold); font-weight: 700; }

    /* Content */
    .content { padding: 16px 24px 60px; max-width: 680px; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Panel header */
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .count-label  { font-size: 12px; color: var(--muted); }
    .add-btn { background: var(--gold); color: #1A0E00; border: none; border-radius: 100px; padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .add-btn:hover { opacity: 0.9; }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
    .card-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .card-date  { font-size: 11px; color: var(--muted); }
    .card-text  { font-size: 14px; line-height: 1.5; color: var(--text); }
    .card-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
    .card-desc  { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: rgba(245,158,11,0.1); color: var(--golddim); font-size: 10px; padding: 2px 8px; border-radius: 100px; }
    .mood-pill { font-size: 10px; padding: 3px 10px; border-radius: 100px; }
    .badge { font-size: 10px; padding: 3px 10px; border-radius: 100px; font-weight: 700; white-space: nowrap; }
    .badge-active    { background: rgba(96,165,250,0.15); color: var(--blue); }
    .badge-completed { background: rgba(74,222,128,0.15); color: var(--green); }
    .badge-paused    { background: rgba(241,241,243,0.08); color: var(--muted); }
    .deadline { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .win-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .win-body { flex: 1; min-width: 0; }
    .card-row-win { display: flex; align-items: center; gap: 12px; }

    /* Card action buttons */
    .card-actions { display: flex; gap: 5px; flex-shrink: 0; margin-left: 8px; }
    .icon-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 3px 7px; cursor: pointer; font-size: 12px; color: var(--muted); transition: all 0.15s; line-height: 1.4; font-family: inherit; }
    .icon-btn:hover      { border-color: var(--gold); color: var(--gold); }
    .icon-btn.del:hover  { border-color: var(--red);  color: var(--red); }
    .done-btn { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); border-radius: 8px; padding: 3px 10px; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--green); font-family: inherit; }
    .done-btn:hover { background: rgba(74,222,128,0.22); }

    /* Empty / loading */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .loading { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 60px 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:1} }
    .section-label { font-size: 9px; letter-spacing: 2.5px; color: var(--golddim); text-transform: uppercase; margin: 16px 0 8px; }

    /* Templates toolbar */
    .tpl-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:8px; flex-wrap:wrap; }
    .tpl-sel-row { display:flex; gap:6px; }
    .tpl-sel { background:var(--card2); border:1px solid var(--border); color:var(--muted); padding:7px 14px; border-radius:10px; cursor:pointer; font-size:12px; font-family:inherit; transition:all .15s; }
    .tpl-sel.active { background:rgba(245,158,11,0.12); border-color:rgba(245,158,11,0.5); color:var(--gold); font-weight:700; }
    .print-btn { background:var(--gold); color:#1A0E00; border:none; border-radius:10px; padding:8px 18px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
    /* A4 template page */
    .tpl-page { background:white; color:#1a1a1a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:14mm; max-width:210mm; margin:0 auto; min-height:277mm; box-shadow:0 4px 30px rgba(0,0,0,0.4); border-radius:4px; }
    .tpl-header { display:flex; align-items:center; gap:14px; padding-bottom:10px; border-bottom:2.5px solid #1a1a1a; margin-bottom:14px; }
    .tpl-logo  { font-size:34px; font-weight:900; color:#1a1a1a; line-height:1; letter-spacing:-1px; }
    .tpl-title { font-size:19px; font-weight:800; color:#1a1a1a; }
    .tpl-date  { font-size:11px; color:#666; margin-top:2px; }
    .tpl-section-title { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:#555; margin:12px 0 7px; font-weight:700; }
    .tpl-metrics-row { display:flex; gap:6px; margin-bottom:12px; }
    .tpl-metric { flex:1; }
    .tpl-metric-label { font-size:8px; color:#888; letter-spacing:.8px; text-transform:uppercase; margin-bottom:3px; }
    .tpl-metric-box { height:30px; border:1px solid #ccc; border-radius:4px; }
    .tpl-two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .tpl-cb-row { display:flex; align-items:center; gap:6px; margin-bottom:7px; }
    .tpl-cb  { font-size:14px; color:#333; flex-shrink:0; }
    .tpl-num { font-size:12px; font-weight:700; color:#333; flex-shrink:0; width:16px; }
    .tpl-line { flex:1; border-bottom:1px solid #ddd; height:18px; }
    .tpl-write-line { border-bottom:1px solid #ddd; height:24px; margin-bottom:6px; }
    .tpl-table { width:100%; border-collapse:collapse; font-size:10px; margin-top:4px; }
    .tpl-table th { background:#1a1a1a; color:white; padding:5px 6px; text-align:left; font-size:9px; letter-spacing:1px; }
    .tpl-table td { border-bottom:1px solid #e5e5e5; padding:9px 6px; }
    .tpl-table tr:nth-child(even) td { background:#f9f9f9; }
    .tpl-goal-card { border:1px solid #e0e0e0; border-radius:6px; padding:10px 12px; margin-bottom:10px; }
    .tpl-goal-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; gap:8px; }
    .tpl-goal-title { font-size:14px; font-weight:700; color:#1a1a1a; }
    .tpl-goal-date  { font-size:10px; color:#888; white-space:nowrap; }
    .tpl-goal-desc  { font-size:11px; color:#555; margin-bottom:7px; line-height:1.4; }
    .tpl-goal-note  { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:#aaa; margin-bottom:4px; }
    .tpl-completed-goal { font-size:11px; color:#999; padding:4px 0; border-bottom:1px solid #f0f0f0; }
    .tpl-win-item { border-left:2.5px solid #e0e0e0; padding:5px 10px; margin-bottom:8px; }
    .tpl-lesson { border-left-color:#93C5FD; }
    .tpl-win-title { font-size:12px; font-weight:700; color:#1a1a1a; }
    .tpl-win-desc  { font-size:10px; color:#555; margin-top:2px; line-height:1.4; }
    .tpl-win-date  { font-size:9px; color:#bbb; margin-top:3px; }
    .tpl-empty { font-size:11px; color:#aaa; font-style:italic; margin:4px 0 8px; }
    .tpl-footer { text-align:center; font-size:8px; letter-spacing:3px; text-transform:uppercase; color:#ccc; margin-top:18px; padding-top:10px; border-top:1px solid #ebebeb; }
    /* Print: hide UI chrome, show only template */
    @media print {
      header,.tabs,#overlay,#toast,.tpl-toolbar { display:none !important; }
      body { background:white !important; }
      .content { padding:0 !important; max-width:100% !important; margin:0 !important; }
      .panel { display:none !important; }
      #panel-templates { display:block !important; }
      .tpl-page { box-shadow:none !important; padding:8mm; max-width:100%; margin:0; }
      @page { size:A4 portrait; margin:6mm; }
    }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .overlay.hidden { display: none; }
    .modal { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-head { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-head h3 { font-size: 18px; font-weight: 700; }
    .close-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; font-family: inherit; }
    .close-btn:hover { border-color: var(--red); color: var(--red); }
    .modal-body { padding: 16px 20px 0; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--golddim); margin-bottom: 8px; }
    .form-input { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 14px; font-family: inherit; }
    .form-input:focus { outline: none; border-color: var(--gold); }
    textarea.form-input { min-height: 90px; resize: vertical; }
    input[type="date"].form-input::-webkit-calendar-picker-indicator { filter: invert(0.6); }

    /* Toggle chips (win type, goal status) */
    .toggle-row { display: flex; gap: 8px; }
    .tog { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--card2); color: var(--muted); font-size: 13px; cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit; }
    .tog.on-gold  { border-color:rgba(245,158,11,0.6);  background:rgba(245,158,11,0.12);  color:var(--gold);  font-weight:700; }
    .tog.on-blue  { border-color:rgba(96,165,250,0.6);  background:rgba(96,165,250,0.10);  color:var(--blue);  font-weight:700; }
    .tog.on-green { border-color:rgba(74,222,128,0.6);  background:rgba(74,222,128,0.10);  color:var(--green); font-weight:700; }
    .tog.on-muted { border-color:rgba(241,241,243,0.2); background:rgba(241,241,243,0.05); color:var(--muted); font-weight:700; }

    /* Mood picker */
    .mood-row { display: flex; gap: 8px; }
    .mood-btn { flex: 1; font-size: 24px; text-align: center; padding: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--card2); cursor: pointer; transition: all 0.12s; user-select: none; }
    .mood-btn.on { border-color: rgba(245,158,11,0.6); background: rgba(245,158,11,0.15); }

    /* Modal footer */
    .modal-footer { display: flex; gap: 8px; padding: 16px 20px 24px; }
    .btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.88; }
    .btn-primary   { background: var(--gold);   color: #1A0E00; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-danger    { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.3); flex: 0 0 auto; padding: 12px 16px; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--card2); border: 1px solid rgba(245,158,11,0.35); color: var(--text); padding: 10px 22px; border-radius: 100px; font-size: 13px; z-index: 200; transition: opacity 0.3s; white-space: nowrap; }
    .toast.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:baseline;gap:8px">
    <span class="logo-k">K</span><span class="logo-rest">aizen</span>
    <span class="logo-sub">Companion</span>
  </div>
  <button class="refresh-btn" onclick="loadAll()" title="Refresh">↻</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('journal')">📓 Journal</div>
  <div class="tab"        onclick="switchTab('goals')">🎯 Goals</div>
  <div class="tab"        onclick="switchTab('wins')">🏆 Wins</div>
  <div class="tab"        onclick="switchTab('templates')">📋 Templates</div>
</div>

<div class="content">
  <div id="panel-journal"   class="panel active"></div>
  <div id="panel-goals"     class="panel"></div>
  <div id="panel-wins"      class="panel"></div>
  <div id="panel-templates" class="panel"></div>
</div>

<!-- Modal -->
<div id="overlay" class="overlay hidden" onclick="overlayBg(event)">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title"></h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
  const SUPABASE_URL = 'https://iygpfvthdgzxthjnwfym.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Z3BmdnRoZGd6eHRoam53ZnltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTEzNjgsImV4cCI6MjA5MzIyNzM2OH0.JRNfs7Oa6G8OHX7S7XCh7W-q0haCvQY5T1TpQm7p3DY';

  const MOOD_EMOJI = ['😔','😐','🙂','😄','🔥'];
  const MOOD_COLOR = ['#F87171','#FACC15','#60A5FA','#4ADE80','#FF9F43'];

  // ── Data cache (avoids embedding JSON in onclick attributes) ───────────────
  let _journal = [], _goals = [], _wins = [];

  // ── Modal state ────────────────────────────────────────────────────────────
  let modalType       = null;   // 'journal' | 'goal' | 'win'
  let editingId       = null;   // remote_id being edited, null = new
  let selMood         = 3;
  let selWinType      = 'WIN';
  let selStatus       = 'ACTIVE';

  // ── API ────────────────────────────────────────────────────────────────────
  const H = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

  async function apiGet(table, order) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?order=${order}&limit=200`, { headers: H });
    if (!r.ok) throw new Error(`${table}: ${r.status}`);
    return r.json();
  }

  async function apiUpsert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...H, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify([data]),
    });
    if (!r.ok) throw new Error(`Save failed: ${r.status}`);
  }

  async function apiDelete(table, remoteId) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?remote_id=eq.${remoteId}`, { method: 'DELETE', headers: H });
    if (!r.ok) throw new Error(`Delete failed: ${r.status}`);
  }

  // ── Utilities ──────────────────────────────────────────────────────────────
  function today()    { return new Date().toISOString().split('T')[0]; }
  function nowMs()    { return Date.now(); }
  function uuid()     { return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);}); }
  function esc(s)     { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(s) { try{return new Date(s+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}catch{return s||'';} }
  function spinner()  { return `<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`; }

  let toastTimer = null;
  function toast(msg, err=false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.borderColor = err ? 'rgba(248,113,113,0.4)' : 'rgba(245,158,11,0.4)';
    el.classList.remove('hidden');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.add('hidden'), 2600);
  }

  // ── Modal helpers ──────────────────────────────────────────────────────────
  function overlayBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
  function closeModal()  {
    document.getElementById('overlay').classList.add('hidden');
    modalType = null; editingId = null;
  }
  function openModal(title) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('overlay').classList.remove('hidden');
  }

  // ── Journal modal ──────────────────────────────────────────────────────────
  function openJournalModal(idx) {
    const e   = idx != null ? _journal[idx] : null;
    modalType = 'journal';
    editingId = e ? e.remote_id : null;
    selMood   = e ? (e.mood || 3) : 3;

    openModal(e ? 'Edit Journal Entry' : 'New Journal Entry');

    document.getElementById('modal-body').innerHTML = `
      <div class="form-group">
        <label class="form-label">MOOD</label>
        <div class="mood-row">
          ${MOOD_EMOJI.map((em,i) => `<div class="mood-btn${selMood===i+1?' on':''}" id="m${i+1}" onclick="pickMood(${i+1})">${em}</div>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">DATE</label>
        <input class="form-input" type="date" id="j-date" value="${esc(e?.date ?? today())}">
      </div>
      <div class="form-group">
        <label class="form-label">ENTRY</label>
        <textarea class="form-input" id="j-text" placeholder="What's on your mind?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">TAGS (comma-separated)</label>
        <input class="form-input" type="text" id="j-tags" placeholder="recovery, mindset, pr...">
      </div>
    `;
    document.getElementById('j-text').value = e?.text || '';
    document.getElementById('j-tags').value = e?.tags || '';

    document.getElementById('modal-footer').innerHTML =
      (e ? `<button class="btn btn-danger" onclick="confirmDelete()">Delete</button>` : '') +
      `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
       <button class="btn btn-primary" onclick="saveJournal()">Save</button>`;
  }

  function pickMood(n) {
    selMood = n;
    for (let i=1;i<=5;i++) document.getElementById(`m${i}`)?.classList.toggle('on', i===n);
  }

  async function saveJournal() {
    const text = document.getElementById('j-text').value.trim();
    if (!text) { toast('Entry text is required', true); return; }
    try {
      await apiUpsert('journal_entries', {
        remote_id: editingId || uuid(),
        date:      document.getElementById('j-date').value || today(),
        text,
        mood:      selMood,
        tags:      document.getElementById('j-tags').value.trim(),
        updated_at: nowMs(),
      });
      closeModal(); toast(editingId ? 'Entry updated ✓' : 'Entry saved ✓');
      await loadAll();
    } catch(e) { toast(e.message, true); }
  }

  // ── Goal modal ─────────────────────────────────────────────────────────────
  function openGoalModal(idx) {
    const g   = idx != null ? _goals[idx] : null;
    modalType = 'goal';
    editingId = g ? g.remote_id : null;
    selStatus = g ? (g.status || 'ACTIVE') : 'ACTIVE';

    openModal(g ? 'Edit Goal' : 'New Goal');

    const STATUS = [
      ['ACTIVE','Active','on-blue'], ['PAUSED','Paused','on-muted'], ['COMPLETED','Completed','on-green'],
    ];

    document.getElementById('modal-body').innerHTML = `
      <div class="form-group">
        <label class="form-label">TITLE</label>
        <input class="form-input" type="text" id="g-title" placeholder="e.g. 5 strict pull-ups by June">
      </div>
      <div class="form-group">
        <label class="form-label">DESCRIPTION (optional)</label>
        <textarea class="form-input" id="g-desc" placeholder="Why this matters..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">TARGET DATE (optional)</label>
        <input class="form-input" type="date" id="g-date" value="${esc(g?.target_date ?? '')}">
      </div>
      <div class="form-group">
        <label class="form-label">STATUS</label>
        <div class="toggle-row">
          ${STATUS.map(([v,l,c]) => `<div class="tog${selStatus===v?' '+c:''}" id="gs-${v}" onclick="pickStatus('${v}','${c}')">${l}</div>`).join('')}
        </div>
      </div>
    `;
    document.getElementById('g-title').value = g?.title || '';
    document.getElementById('g-desc').value  = g?.description || '';

    document.getElementById('modal-footer').innerHTML =
      (g ? `<button class="btn btn-danger" onclick="confirmDelete()">Delete</button>` : '') +
      `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
       <button class="btn btn-primary" onclick="saveGoal()">Save</button>`;
  }

  function pickStatus(v, cls) {
    selStatus = v;
    ['ACTIVE','PAUSED','COMPLETED'].forEach(s => {
      const el = document.getElementById(`gs-${s}`);
      if (!el) return;
      const map = {ACTIVE:'on-blue',PAUSED:'on-muted',COMPLETED:'on-green'};
      el.className = 'tog' + (s === v ? ' ' + map[s] : '');
    });
  }

  async function saveGoal() {
    const title = document.getElementById('g-title').value.trim();
    if (!title) { toast('Title is required', true); return; }
    try {
      await apiUpsert('goals', {
        remote_id:   editingId || uuid(),
        title,
        description: document.getElementById('g-desc').value.trim(),
        target_date: document.getElementById('g-date').value || '',
        status:      selStatus,
        updated_at:  nowMs(),
      });
      closeModal(); toast(editingId ? 'Goal updated ✓' : 'Goal saved ✓');
      await loadAll();
    } catch(e) { toast(e.message, true); }
  }

  async function markDone(idx) {
    const g = _goals[idx];
    try {
      await apiUpsert('goals', { ...g, status: 'COMPLETED', updated_at: nowMs() });
      toast('Goal completed ✓'); await loadAll();
    } catch(e) { toast(e.message, true); }
  }

  // ── Win modal ──────────────────────────────────────────────────────────────
  function openWinModal(idx) {
    const w    = idx != null ? _wins[idx] : null;
    modalType  = 'win';
    editingId  = w ? w.remote_id : null;
    selWinType = w ? (w.type || 'WIN') : 'WIN';

    openModal(w ? 'Edit Entry' : 'New Win / Lesson');
    renderWinModal(w);
  }

  function renderWinModal(w) {
    const isWin = selWinType === 'WIN';
    document.getElementById('modal-body').innerHTML = `
      <div class="form-group">
        <label class="form-label">TYPE</label>
        <div class="toggle-row">
          <div class="tog${selWinType==='WIN'?' on-gold':''}" id="wt-WIN"  onclick="pickWinType('WIN')">🏆 Win</div>
          <div class="tog${selWinType==='LOSS'?' on-blue':''}" id="wt-LOSS" onclick="pickWinType('LOSS')">📖 Lesson</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" id="wt-label">${isWin ? 'WIN' : 'LESSON'}</label>
        <input class="form-input" type="text" id="w-title" placeholder="${isWin ? 'e.g. First strict pull-up!' : 'e.g. Skipped rest day — regretted it'}">
      </div>
      <div class="form-group">
        <label class="form-label">DETAILS (optional)</label>
        <textarea class="form-input" id="w-desc" placeholder="${isWin ? 'What made it special...' : 'What I\'d do differently...'}"></textarea>
      </div>
    `;
    document.getElementById('w-title').value = w?.title || '';
    document.getElementById('w-desc').value  = w?.description || '';

    const accentColor = selWinType === 'WIN' ? 'var(--streak)' : 'var(--blue)';
    document.getElementById('modal-footer').innerHTML =
      (w ? `<button class="btn btn-danger" onclick="confirmDelete()">Delete</button>` : '') +
      `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
       <button class="btn btn-primary" id="win-save-btn" style="background:${accentColor};color:#000" onclick="saveWin()">Save</button>`;
  }

  function pickWinType(type) {
    selWinType = type;
    const w = editingId ? _wins.find(x => x.remote_id === editingId) : null;
    renderWinModal(w);
  }

  async function saveWin() {
    const title = document.getElementById('w-title').value.trim();
    if (!title) { toast('Title is required', true); return; }
    try {
      await apiUpsert('wins', {
        remote_id:   editingId || uuid(),
        title,
        description: document.getElementById('w-desc').value.trim(),
        date:        today(),
        type:        selWinType,
        updated_at:  nowMs(),
      });
      closeModal();
      toast(editingId ? 'Updated ✓' : (selWinType === 'WIN' ? 'Win logged ✓' : 'Lesson logged ✓'));
      await loadAll();
    } catch(e) { toast(e.message, true); }
  }

  // ── Unified delete ─────────────────────────────────────────────────────────
  async function confirmDelete() {
    const tableMap = { journal: 'journal_entries', goal: 'goals', win: 'wins' };
    const label    = { journal: 'journal entry', goal: 'goal', win: 'entry' };
    if (!confirm(`Delete this ${label[modalType]}?`)) return;
    try {
      await apiDelete(tableMap[modalType], editingId);
      closeModal(); toast('Deleted');
      await loadAll();
    } catch(e) { toast(e.message, true); }
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderJournal(entries) {
    if (!entries.length) return `<div class="empty"><div class="empty-icon">📓</div><div class="empty-title">No entries yet</div><div>Add your first journal entry above.</div></div>`;
    return entries.map((e, i) => {
      const mood   = Math.max(0, Math.min(4, (e.mood||3) - 1));
      const mColor = MOOD_COLOR[mood];
      const tags   = (e.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
      return `
        <div class="card" style="border-color:${mColor}33">
          <div class="card-row">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:18px">${MOOD_EMOJI[mood]}</span>
              <span class="card-date">${fmtDate(e.date)}</span>
            </div>
            <div class="card-actions">
              <button class="icon-btn"     onclick="openJournalModal(${i})">✏️</button>
              <button class="icon-btn del" onclick="quickDelete('journal_entries','${esc(e.remote_id)}','journal entry')">🗑️</button>
            </div>
          </div>
          <div class="card-text">${esc(e.text)}</div>
          ${tags.length ? `<div class="tags">${tags.slice(0,5).map(t=>`<span class="tag">#${esc(t)}</span>`).join('')}</div>` : ''}
        </div>`;
    }).join('');
  }

  function renderGoals(goals) {
    if (!goals.length) return `<div class="empty"><div class="empty-icon">🎯</div><div class="empty-title">No goals yet</div><div>Add your first goal above.</div></div>`;
    const active    = goals.filter(g => g.status === 'ACTIVE');
    const completed = goals.filter(g => g.status === 'COMPLETED');
    const paused    = goals.filter(g => g.status === 'PAUSED');
    const card = (g, i) => {
      const isComp = g.status === 'COMPLETED';
      const badge  = g.status==='ACTIVE'    ? `<span class="badge badge-active">ACTIVE</span>`
                   : g.status==='COMPLETED' ? `<span class="badge badge-completed">DONE ✓</span>`
                                            : `<span class="badge badge-paused">PAUSED</span>`;
      return `
        <div class="card">
          <div class="card-row">
            <span class="card-title" style="${isComp?'text-decoration:line-through;opacity:0.5':''}">${esc(g.title)}</span>
            <div class="card-actions">
              ${badge}
              ${!isComp ? `<button class="done-btn" onclick="markDone(${i})">Done ✓</button>` : ''}
              <button class="icon-btn"     onclick="openGoalModal(${i})">✏️</button>
              <button class="icon-btn del" onclick="quickDelete('goals','${esc(g.remote_id)}','goal')">🗑️</button>
            </div>
          </div>
          ${g.description ? `<div class="card-desc">${esc(g.description)}</div>` : ''}
          ${g.target_date ? `<div class="deadline">📅 By ${fmtDate(g.target_date)}</div>` : ''}
        </div>`;
    };
    let html = '';
    if (active.length)    html += `<div class="section-label">Active</div>`    + active.map((g,i) => card(g, goals.indexOf(g))).join('');
    if (completed.length) html += `<div class="section-label">Completed</div>` + completed.map(g => card(g, goals.indexOf(g))).join('');
    if (paused.length)    html += `<div class="section-label">Paused</div>`    + paused.map(g => card(g, goals.indexOf(g))).join('');
    return html;
  }

  function renderWins(wins) {
    if (!wins.length) return `<div class="empty"><div class="empty-icon">🏆</div><div class="empty-title">Nothing logged yet</div><div>Log a win or lesson above.</div></div>`;
    const winsOnly = wins.filter(w => (w.type||'WIN') === 'WIN');
    const lessons  = wins.filter(w => w.type === 'LOSS');
    const card = (w, i) => {
      const isWin = (w.type||'WIN') === 'WIN';
      const accent = isWin ? 'var(--streak)' : 'var(--blue)';
      return `
        <div class="card">
          <div class="card-row-win">
            <div class="win-icon" style="background:${isWin?'rgba(251,146,60,0.15)':'rgba(96,165,250,0.15)'}">${isWin?'🏆':'📖'}</div>
            <div class="win-body">
              <div class="card-row" style="margin-bottom:2px">
                <span class="card-title">${esc(w.title)}</span>
                <div class="card-actions">
                  <button class="icon-btn"     onclick="openWinModal(${i})">✏️</button>
                  <button class="icon-btn del" onclick="quickDelete('wins','${esc(w.remote_id)}','entry')">🗑️</button>
                </div>
              </div>
              ${w.description ? `<div class="card-desc">${esc(w.description)}</div>` : ''}
              <div class="card-date" style="margin-top:4px">${fmtDate(w.date)}</div>
            </div>
          </div>
        </div>`;
    };
    let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">${winsOnly.length} win${winsOnly.length!==1?'s':''} · ${lessons.length} lesson${lessons.length!==1?'s':''}</div>`;
    if (winsOnly.length) html += `<div class="section-label">Wins</div>`            + winsOnly.map((w,i) => card(w, wins.indexOf(w))).join('');
    if (lessons.length)  html += `<div class="section-label">Lessons Learned</div>` + lessons.map(w => card(w, wins.indexOf(w))).join('');
    return html;
  }

  // Quick delete without opening modal (from card 🗑️ button)
  async function quickDelete(table, remoteId, label) {
    if (!confirm(`Delete this ${label}?`)) return;
    try {
      await apiDelete(table, remoteId);
      toast('Deleted'); await loadAll();
    } catch(e) { toast(e.message, true); }
  }

  function panelHeader(countLabel, addLabel, addFn) {
    return `<div class="panel-header"><span class="count-label">${countLabel}</span><button class="add-btn" onclick="${addFn}">+ ${addLabel}</button></div>`;
  }

  // ── Load all ───────────────────────────────────────────────────────────────
  async function loadAll() {
    ['journal','goals','wins'].forEach(id => document.getElementById(`panel-${id}`).innerHTML = spinner());
    try {
      const [j, g, w] = await Promise.all([
        apiGet('journal_entries', 'date.desc'),
        apiGet('goals',           'updated_at.desc'),
        apiGet('wins',            'date.desc'),
      ]);
      _journal = j; _goals = g; _wins = w;

      document.getElementById('panel-journal').innerHTML =
        panelHeader(`${j.length} entr${j.length!==1?'ies':'y'}`, 'Entry', 'openJournalModal(null)') +
        renderJournal(j);

      document.getElementById('panel-goals').innerHTML =
        panelHeader(`${g.filter(x=>x.status==='ACTIVE').length} active`, 'Goal', 'openGoalModal(null)') +
        renderGoals(g);

      document.getElementById('panel-wins').innerHTML =
        panelHeader(`${w.length} total`, 'Log', 'openWinModal(null)') +
        renderWins(w);

      if (document.getElementById('panel-templates').classList.contains('active')) renderTemplate();

    } catch(err) {
      const msg = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Couldn't load data</div><div>${err.message}</div></div>`;
      ['journal','goals','wins'].forEach(id => document.getElementById(`panel-${id}`).innerHTML = msg);
    }
  }

  // ── Supernote templates ────────────────────────────────────────────────────
  let _tplType = 'daily';

  function selectTemplate(type) { _tplType = type; renderTemplate(); }

  function renderTemplate() {
    const p = document.getElementById('panel-templates');
    const toolbar = `
      <div class="tpl-toolbar">
        <div class="tpl-sel-row">
          <button class="tpl-sel${_tplType==='daily'?' active':''}"   onclick="selectTemplate('daily')">📋 Daily</button>
          <button class="tpl-sel${_tplType==='goals'?' active':''}"   onclick="selectTemplate('goals')">🎯 Goals</button>
          <button class="tpl-sel${_tplType==='weekly'?' active':''}"  onclick="selectTemplate('weekly')">🏆 Weekly</button>
        </div>
        <button class="print-btn" onclick="window.print()">🖨️ Print / PDF</button>
      </div>`;
    const content = _tplType==='daily'  ? renderDailyTpl()
                  : _tplType==='goals'  ? renderGoalsTpl(_goals)
                  : renderWeeklyTpl(_wins);
    p.innerHTML = toolbar + content;
  }

  function renderDailyTpl() {
    const now   = new Date();
    const day   = now.toLocaleDateString('en-US',{weekday:'long'});
    const date  = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const cb    = n => Array(n).fill(0).map(()=>`<div class="tpl-cb-row"><span class="tpl-cb">□</span><div class="tpl-line"></div></div>`).join('');
    const lines = n => Array(n).fill(0).map(()=>`<div class="tpl-write-line"></div>`).join('');
    return `<div class="tpl-page">
      <div class="tpl-header">
        <div class="tpl-logo">K</div>
        <div><div class="tpl-title">Daily Kaizen</div><div class="tpl-date">${day}, ${date}</div></div>
      </div>
      <div class="tpl-section-title">📊 Metrics</div>
      <div class="tpl-metrics-row">
        ${['Body Battery','WHOOP','HRV','Sleep','Steps'].map(m=>`<div class="tpl-metric"><div class="tpl-metric-label">${m}</div><div class="tpl-metric-box"></div></div>`).join('')}
      </div>
      <div class="tpl-two-col">
        <div>
          <div class="tpl-section-title">☀️ Morning Habits</div>${cb(6)}
        </div>
        <div>
          <div class="tpl-section-title">🌙 Evening Habits</div>${cb(4)}
          <div class="tpl-section-title" style="margin-top:10px">💊 Supplements / Meds</div>${cb(2)}
        </div>
      </div>
      <div class="tpl-section-title">🏋️ Workout Log</div>
      <table class="tpl-table">
        <thead><tr><th>Exercise</th><th>Sets</th><th>Reps</th><th>Weight</th><th>Notes</th></tr></thead>
        <tbody>${Array(7).fill(0).map(()=>`<tr><td></td><td></td><td></td><td></td><td></td></tr>`).join('')}</tbody>
      </table>
      <div class="tpl-two-col" style="margin-top:12px">
        <div><div class="tpl-section-title">✦ What went well</div>${lines(3)}</div>
        <div><div class="tpl-section-title">↑ What to improve</div>${lines(3)}</div>
      </div>
      <div class="tpl-section-title" style="margin-top:10px">⬡ Tomorrow's 3 Priorities</div>
      ${[1,2,3].map(n=>`<div class="tpl-cb-row"><span class="tpl-num">${n}.</span><div class="tpl-line"></div></div>`).join('')}
      <div class="tpl-footer">kaizen · ${day.toLowerCase()} · daily discipline</div>
    </div>`;
  }

  function renderGoalsTpl(goals) {
    const date    = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const active  = goals.filter(g=>g.status==='ACTIVE');
    const done    = goals.filter(g=>g.status==='COMPLETED');
    return `<div class="tpl-page">
      <div class="tpl-header">
        <div class="tpl-logo">K</div>
        <div><div class="tpl-title">Goals Review</div><div class="tpl-date">${date}</div></div>
      </div>
      <div class="tpl-section-title">🎯 Active Goals (${active.length})</div>
      ${active.length===0 ? '<p class="tpl-empty">No active goals — add some in the app.</p>' : active.map(g=>`
        <div class="tpl-goal-card">
          <div class="tpl-goal-header">
            <span class="tpl-goal-title">${esc(g.title)}</span>
            ${g.target_date?`<span class="tpl-goal-date">📅 ${fmtDate(g.target_date)}</span>`:''}
          </div>
          ${g.description?`<div class="tpl-goal-desc">${esc(g.description)}</div>`:''}
          <div class="tpl-goal-note">Progress / Notes</div>
          <div class="tpl-write-line"></div><div class="tpl-write-line"></div>
        </div>`).join('')}
      ${done.length>0?`<div class="tpl-section-title" style="margin-top:12px">✓ Completed</div>
        ${done.map(g=>`<div class="tpl-completed-goal">✓ ${esc(g.title)}</div>`).join('')}`:''}
      <div class="tpl-footer">kaizen · goal mastery</div>
    </div>`;
  }

  function renderWeeklyTpl(wins) {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-14);
    const recent = wins.filter(w=>new Date(w.date+'T00:00:00')>=cutoff);
    const wOnly  = recent.filter(w=>(w.type||'WIN')==='WIN');
    const lessons= recent.filter(w=>w.type==='LOSS');
    const date   = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const winCard= (w,cls='')=>`<div class="tpl-win-item${cls}">
      <div class="tpl-win-title">${esc(w.title)}</div>
      ${w.description?`<div class="tpl-win-desc">${esc(w.description)}</div>`:''}
      <div class="tpl-win-date">${fmtDate(w.date)}</div></div>`;
    const cb = n=>Array(n).fill(0).map(()=>`<div class="tpl-cb-row"><span class="tpl-cb">□</span><div class="tpl-line"></div></div>`).join('');
    return `<div class="tpl-page">
      <div class="tpl-header">
        <div class="tpl-logo">K</div>
        <div><div class="tpl-title">Weekly Review</div><div class="tpl-date">${date} · last 14 days</div></div>
      </div>
      <div class="tpl-two-col">
        <div>
          <div class="tpl-section-title">🏆 Wins (${wOnly.length})</div>
          ${wOnly.length===0?'<p class="tpl-empty">Nothing logged</p>':wOnly.map(w=>winCard(w)).join('')}
        </div>
        <div>
          <div class="tpl-section-title">📖 Lessons (${lessons.length})</div>
          ${lessons.length===0?'<p class="tpl-empty">Nothing logged</p>':lessons.map(w=>winCard(w,' tpl-lesson')).join('')}
        </div>
      </div>
      <div class="tpl-section-title" style="margin-top:14px">✦ Reflection</div>
      ${Array(4).fill(0).map(()=>`<div class="tpl-write-line" style="margin-bottom:14px"></div>`).join('')}
      <div class="tpl-two-col" style="margin-top:8px">
        <div><div class="tpl-section-title">Next week's focus</div>${cb(3)}</div>
        <div><div class="tpl-section-title">Habits to lock in</div>${cb(3)}</div>
      </div>
      <div class="tpl-footer">kaizen · continuous improvement</div>
    </div>`;
  }

  function switchTab(name) {
    const names = ['journal','goals','wins','templates'];
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${name}`).classList.add('active');
    if (name === 'templates') renderTemplate();
  }

  loadAll();
</script>
</body>
</html>
